backend:
  name: github
  repo: SinYita/Personal
  branch: main

site_url: https://sinyita.github.io/Personal
display_url: https://sinyita.github.io/Personal

# Enable this for local editing with `npx decap-server`.
local_backend: false

media_folder: public/assets
public_folder: /assets

collections:
  - name: posts
    label: Blog Posts
    label_singular: Blog Post
    folder: content/posts
    create: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: tags, label: Tags, widget: list, field: { name: tag, label: Tag, widget: string } }
      - { name: excerpt, label: Excerpt, widget: text }
      - { name: body, label: Body, widget: markdown }

  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    create: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    fields:
      - { name: id, label: ID, widget: string }
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text }
      - { name: techStack, label: Tech Stack, widget: list, field: { name: tech, label: Tech, widget: string } }
      - { name: tags, label: Tags, widget: list, field: { name: tag, label: Tag, widget: string } }
      - { name: github, label: GitHub URL, widget: string, required: false }
      - { name: demo, label: Demo URL, widget: string, required: false }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: date, label: Date, widget: string }
      - { name: body, label: Body, widget: markdown }

  - name: resume
    label: Resume
    files:
      - name: profile
        label: Resume Profile
        file: content/resume.md
        format: frontmatter
        fields:
          - { name: name, label: Name, widget: string }
          - { name: email, label: Email, widget: string }
          - { name: github, label: GitHub, widget: string }
          - { name: linkedin, label: LinkedIn, widget: string, required: false }
          - { name: leetcode, label: LeetCode, widget: string, required: false }
          - { name: codeforces, label: Codeforces, widget: string, required: false }
          - { name: hackerrank, label: Hackerrank, widget: string, required: false }
          - { name: atcoder, label: Atcoder, widget: string, required: false }
          - { name: avatar, label: Avatar Path, widget: string, required: false, hint: "Example: /assets/profile.jpg" }
          - { name: homeHeading, label: Home Heading, widget: string }
          - { name: homeSubtitle, label: Home Subtitle, widget: string }
          - { name: homeSummary, label: Home Summary, widget: text }
          - { name: title, label: Title, widget: string }
          - { name: location, label: Location, widget: string }
          - { name: summary, label: Summary, widget: text }
          - name: education
            label: Education
            widget: list
            fields:
              - { name: degree, label: Degree, widget: string }
              - { name: school, label: School, widget: string }
              - { name: duration, label: Duration, widget: string }
              - { name: gpa, label: GPA, widget: string }
              - name: highlights
                label: Highlights
                widget: list
                field: { name: highlight, label: Highlight, widget: string }
          - name: experience
            label: Experience
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: company, label: Company, widget: string }
              - { name: duration, label: Duration, widget: string }
              - name: highlights
                label: Highlights
                widget: list
                field: { name: highlight, label: Highlight, widget: string }
          - name: skills
            label: Skills
            widget: list
            fields:
              - { name: category, label: Category, widget: string }
              - name: items
                label: Items
                widget: list
                field: { name: item, label: Item, widget: string }
          - name: projects
            label: Resume Projects
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: desc, label: Description, widget: text }
              - { name: tech, label: Tech, widget: string }
          - name: languages
            label: Languages
            widget: list
            fields:
              - { name: lang, label: Language, widget: string }
              - { name: level, label: Level, widget: string }
          - { name: body, label: Body, widget: markdown, required: false }
